<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassol · Acesso Restrito</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #060810;
  --panel:  #0c1020;
  --s2:     #111828;
  --s3:     #18243a;
  --border: #1e2e48;
  --acc:    #00d68f;
  --acc2:   #00a06a;
  --blue:   #4d9fff;
  --danger: #ff4466;
  --warn:   #f5c518;
  --txt:    #e8eaf0;
  --muted:  #4a5c72;
  --fd: 'Syne', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--fd);
  overflow: hidden;
}

/* ── BACKGROUND SCENE ─────────────────────────── */
.bg-scene {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}

/* grid lines */
.bg-scene::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,214,143,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,214,143,.04) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, #000 20%, transparent 80%);
}

/* glow blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: .35;
  animation: drift 14s ease-in-out infinite alternate;
}
.blob-1 {
  width: 480px; height: 480px;
  background: radial-gradient(circle, #00d68f 0%, transparent 70%);
  top: -160px; left: -160px;
  animation-delay: 0s;
}
.blob-2 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, #4d9fff 0%, transparent 70%);
  bottom: -120px; right: -100px;
  animation-delay: -7s;
}
.blob-3 {
  width: 240px; height: 240px;
  background: radial-gradient(circle, #c084fc 0%, transparent 70%);
  top: 50%; left: 55%;
  opacity: .2;
  animation-delay: -3s;
}

@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.08); }
}

/* scanlines effect */
.bg-scene::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.03) 2px,
    rgba(0,0,0,.03) 4px
  );
  pointer-events: none;
}

/* ── MAIN LAYOUT ──────────────────────────────── */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 480px;
}

/* ── LEFT PANEL ───────────────────────────────── */
.left-panel {
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 48px 56px;
}

.left-brand {
  display: flex; align-items: center; gap: 14px;
}
.brand-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--acc) 0%, var(--acc2) 100%);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 28px rgba(0,214,143,.4);
}
.brand-name {
  font-size: 17px; font-weight: 800; letter-spacing: -.3px; line-height: 1;
}
.brand-name em { font-style: normal; color: var(--acc); }
.brand-sub {
  font-size: 10px; color: var(--muted); font-family: var(--fm);
  letter-spacing: .5px; margin-top: 3px;
}

.left-hero {
  animation: slideUp .7s ease .1s both;
}
.left-hero h2 {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1.05;
  margin-bottom: 20px;
}
.left-hero h2 .accent { color: var(--acc); }
.left-hero h2 .dim    { color: var(--muted); }
.left-hero p {
  font-size: 14px; color: var(--muted); line-height: 1.7;
  max-width: 400px; font-family: var(--fm);
}

.left-stats {
  display: flex; gap: 32px;
}
.stat-item { }
.stat-val {
  font-size: 22px; font-weight: 800; font-family: var(--fm); color: var(--acc);
}
.stat-lbl {
  font-size: 10px; color: var(--muted); letter-spacing: .5px;
  text-transform: uppercase; font-weight: 600; margin-top: 2px;
}

/* ── RIGHT PANEL (login card) ─────────────────── */
.right-panel {
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  padding: 48px 40px;
  position: relative;
  overflow: hidden;
}

/* subtle corner accent */
.right-panel::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 200px; height: 200px;
  background: radial-gradient(circle at top right, rgba(0,214,143,.07), transparent 70%);
}

.login-card {
  width: 100%; max-width: 360px;
  animation: slideUp .5s ease both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: none; }
}

/* card header */
.card-header {
  margin-bottom: 36px;
}
.card-header h3 {
  font-size: 22px; font-weight: 800; letter-spacing: -.4px; margin-bottom: 6px;
}
.card-header p {
  font-size: 11px; color: var(--muted); font-family: var(--fm);
}

/* fields */
.field { margin-bottom: 18px; }
.field-label {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 9px; font-weight: 800; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px;
}
.field-wrap { position: relative; }
.field-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 15px; opacity: .4; pointer-events: none;
}
.field-input {
  width: 100%;
  background: var(--s2); border: 1px solid var(--border);
  color: var(--txt); font-family: var(--fm); font-size: 13px;
  padding: 13px 44px;
  border-radius: 10px; outline: none;
  transition: border-color .2s, box-shadow .2s;
  letter-spacing: .5px;
}
.field-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(77,159,255,.12);
}
.field-input.shake {
  border-color: var(--danger);
  animation: shake .45s ease;
}
.field-input.locked {
  opacity: .4; cursor: not-allowed;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%     { transform: translateX(-7px); }
  35%     { transform: translateX(7px); }
  55%     { transform: translateX(-4px); }
  75%     { transform: translateX(4px); }
}
.toggle-eye {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 16px;
  transition: color .2s; padding: 4px;
}
.toggle-eye:hover { color: var(--txt); }

/* submit button */
.btn-submit {
  width: 100%; margin-top: 8px;
  background: var(--acc); color: #000;
  font-family: var(--fd); font-size: 14px; font-weight: 800;
  letter-spacing: .3px;
  padding: 14px; border: none; border-radius: 10px;
  cursor: pointer;
  transition: opacity .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 6px 24px rgba(0,214,143,.3);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-submit:hover:not(:disabled) {
  opacity: .9; box-shadow: 0 8px 32px rgba(0,214,143,.4);
}
.btn-submit:active:not(:disabled) { transform: scale(.98); }
.btn-submit:disabled {
  opacity: .35; cursor: not-allowed; box-shadow: none;
}

/* alerts */
.alert {
  border-radius: 8px; padding: 11px 14px;
  font-family: var(--fm); font-size: 11px; line-height: 1.55;
  margin-top: 14px; display: none;
}
.alert.show { display: block; }
.alert-error {
  background: rgba(255,68,102,.08);
  border: 1px solid rgba(255,68,102,.2);
  color: #ff8899;
}
.alert-warn {
  background: rgba(245,197,24,.07);
  border: 1px solid rgba(245,197,24,.2);
  color: var(--warn);
}

/* attempt dots */
.attempt-dots {
  display: flex; gap: 6px; justify-content: center;
  margin-top: 16px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border);
  transition: background .3s;
}
.dot.used { background: var(--danger); }

/* lockout countdown */
.lockout-box {
  display: none; text-align: center; margin-top: 14px;
}
.lockout-box.show { display: block; }
.lockout-count {
  font-family: var(--fm); font-size: 32px; font-weight: 700;
  color: var(--warn); letter-spacing: 2px; margin: 8px 0;
}
.lockout-label {
  font-size: 10px; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; font-weight: 700;
}

/* footer */
.card-footer {
  margin-top: 28px; padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-family: var(--fm); font-size: 10px; color: var(--muted);
}
.lock-icon { font-size: 14px; opacity: .5; }

/* ── RESPONSIVE ───────────────────────────────── */
@media (max-width: 860px) {
  .page { grid-template-columns: 1fr; }
  .left-panel { display: none; }
  .right-panel {
    min-height: 100vh; border-left: none;
    background: var(--bg);
  }
}
</style>
</head>
